name: Read hello.txt on Push

on:
  push:
    branches:
      - main

jobs:
  read-hello-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Display contents of hello.txt
        run: |
          echo "Printing contents of hello.txt:"
          cat hello.txt
